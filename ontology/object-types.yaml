version: 1
objectTypes:
  - name: Customer
    description: CRM customer master data.
    dataDomain: CUSTOMER
    sourceApp: crm
    sourceService: crm-api
    primaryKey: customerId
    properties:
      customerId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      code: { type: string, required: true }
      enabled: { type: boolean, required: true }
      updatedAt: { type: string, format: date-time, required: true }

  - name: SalesOrder
    description: Manufacturing sales order.
    dataDomain: ORDER
    sourceApp: ordering
    sourceService: ordering-api
    primaryKey: orderId
    properties:
      orderId: { type: string, sourceField: id, required: true }
      code: { type: string, required: true }
      name: { type: string, required: true }
      customerId: { type: string }
      customerName: { type: string }
      material: { type: string }
      dueAt: { type: string, format: date-time }
      status: { type: string, required: true }
      amount: { type: number }
      folderId: { type: string, sourceField: directoryId }
      createdAt: { type: string, format: date-time, required: true }

  - name: OrderFolder
    description: Order folder container.
    dataDomain: ORDER
    sourceApp: ordering
    sourceService: ordering-api
    primaryKey: folderId
    properties:
      folderId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      parentId: { type: string }

  - name: DrawingFile
    description: Uploaded drawing file.
    dataDomain: DRAWING
    sourceApp: drawing
    sourceService: drawing-api
    primaryKey: fileId
    properties:
      fileId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      fileName: { type: string }
      format: { type: string }
      orderObjectId: { type: string }
      folderId: { type: string }
      artifactVersionId: { type: string }
      status: { type: string, required: true }
      entityCount: { type: number }
      partCount: { type: number }
      createdAt: { type: string, format: date-time }

  - name: CadEntity
    description: CAD entity under drawing.
    dataDomain: DRAWING
    sourceApp: drawing
    sourceService: drawing-api
    primaryKey: entityId
    properties:
      entityId: { type: string, sourceField: id, required: true }
      fileId: { type: string, required: true }
      type: { type: string, enum: [LINE, ARC, CIRCLE, POLYLINE, TEXT, MTEXT], required: true }
      layer: { type: string }
      geometry: { type: object }
      style: { type: object }

  - name: Part
    description: Recognized manufacturing part.
    dataDomain: DRAWING
    sourceApp: drawing
    sourceService: drawing-api
    primaryKey: partId
    properties:
      partId: { type: string, sourceField: id, required: true }
      partNo: { type: string }
      material: { type: string }
      thickness: { type: number }
      geometryRef: { type: string }
      qty: { type: number }
      sourceFileId: { type: string, required: true }
      sourceEntityIds: { type: array<string> }
      geometry: { type: object }
      bbox: { type: object }
      geometryVersion: { type: string }
      artifactVersionId: { type: string }
      storagePath: { type: string }
      createdAt: { type: string, format: date-time }

  - name: Font
    description: CAD font registry entity.
    dataDomain: DRAWING
    sourceApp: drawing
    sourceService: drawing-api
    primaryKey: fontId
    properties:
      fontId: { type: string, sourceField: id, required: true }
      family: { type: string }
      script: { type: string }
      license: { type: string }
      source: { type: string, enum: [system, user, builtin] }
      format: { type: string }
      supportsSingleLine: { type: boolean }
      supportsDoubleLine: { type: boolean }

  - name: NestingJob
    description: Nesting run job.
    dataDomain: NESTING
    sourceApp: nesting
    sourceService: nesting-api
    primaryKey: jobId
    properties:
      jobId: { type: string, sourceField: id, required: true }
      status: { type: string, required: true }
      progress: { type: number }
      utilization: { type: number }
      createdAt: { type: string, format: date-time }

  - name: NestingLayout
    description: Nesting result layout.
    dataDomain: NESTING
    sourceApp: nesting
    sourceService: nesting-api
    primaryKey: layoutId
    properties:
      layoutId: { type: string, sourceField: id, required: true }
      layoutNo: { type: string }
      status: { type: string, enum: [DRAFT, LOCK_PREPARED, LOCKED, SCHEDULED, LOCK_FAILED, SCHEDULE_FAILED] }
      formatVersion: { type: string }
      orderObjectId: { type: string }
      utilization: { type: number }
      material: { type: object }
      parts: { type: array<object> }
      placedParts: { type: array<object> }
      jobId: { type: string }
      sheetIds: { type: array<string> }
      reservationIds: { type: array<string> }
      layoutArtifactVersionId: { type: string }
      machineMode: { type: string }

  - name: ToolpathPlan
    description: Generated cutting toolpath plan.
    dataDomain: NESTING
    sourceApp: nesting
    sourceService: nesting-api
    primaryKey: planId
    properties:
      planId: { type: string, required: true }
      layoutId: { type: string }
      entries: { type: array<object> }
      segments: { type: array<object> }
      overrides: { type: array<object> }

  - name: GcodeConfig
    description: GCode process config.
    dataDomain: NESTING
    sourceApp: nesting
    sourceService: nesting-api
    primaryKey: configId
    properties:
      configId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      deviceType: { type: string }
      controlSystem: { type: string }
      feedRate: { type: number }
      rapidRate: { type: number }
      leadIn: { type: object }
      leadOut: { type: object }
      microJoint: { type: object }

  - name: SheetMaterial
    description: Sheet material definition.
    dataDomain: INVENTORY
    sourceApp: wms
    sourceService: wms-api
    primaryKey: materialId
    properties:
      materialId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      code: { type: string, required: true }
      hidden: { type: boolean, required: true }
      thicknesses: { type: array<object> }

  - name: Sheet
    description: Sheet stock record.
    dataDomain: INVENTORY
    sourceApp: wms
    sourceService: wms-api
    primaryKey: sheetId
    properties:
      sheetId: { type: string, sourceField: id, required: true }
      sheetCode: { type: string }
      materialId: { type: string, required: true }
      materialName: { type: string }
      thickness: { type: number }
      width: { type: number }
      height: { type: number }
      size: { type: object }
      quantity: { type: number }
      source: { type: string, enum: [plate, remnant] }
      status: { type: string, enum: [in_stock, reserved, hidden] }
      location: { type: string }

  - name: PipeMaterial
    description: Pipe material definition.
    dataDomain: INVENTORY
    sourceApp: wms
    sourceService: wms-api
    primaryKey: pipeId
    properties:
      pipeId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      code: { type: string, required: true }
      hidden: { type: boolean, required: true }
      specs: { type: array<object> }

  - name: PipeStock
    description: Pipe stock record.
    dataDomain: INVENTORY
    sourceApp: wms
    sourceService: wms-api
    primaryKey: stockId
    properties:
      stockId: { type: string, sourceField: id, required: true }
      pipeId: { type: string, required: true }
      pipeName: { type: string }
      specId: { type: string }
      outerDiameterMm: { type: number }
      wallThicknessMm: { type: number }
      lengthMm: { type: number }
      quantity: { type: number }
      status: { type: string }
      location: { type: string }

  - name: ProcessConfig
    description: WMS process config.
    dataDomain: INVENTORY
    sourceApp: wms
    sourceService: wms-api
    primaryKey: configId
    properties:
      configId: { type: string, sourceField: id, required: true }
      name: { type: string, required: true }
      kind: { type: string, enum: [auto, cutting, quote] }
      enabled: { type: boolean }
      params: { type: object }

  - name: Container
    description: Drive container.
    dataDomain: FILE
    sourceApp: drive
    sourceService: drive-api
    primaryKey: containerId
    properties:
      containerId: { type: string, required: true }
      tenantId: { type: string, required: true }
      ownerAppId: { type: string, required: true }
      mode: { type: string, enum: [APP_DATA, MY_DRIVE], required: true }
      name: { type: string, required: true }
      quotaBytes: { type: number }
      usedBytes: { type: number }

  - name: Artifact
    description: Drive artifact.
    dataDomain: FILE
    sourceApp: drive
    sourceService: drive-api
    primaryKey: artifactId
    properties:
      artifactId: { type: string, required: true }
      tenantId: { type: string, required: true }
      containerId: { type: string, required: true }
      artifactType: { type: string, enum: [DRAWING, PARTS, LAYOUT], required: true }
      ownerAppId: { type: string, required: true }
      displayName: { type: string, required: true }
      mimeType: { type: string, required: true }
      currentVersionId: { type: string, required: true }
      path: { type: string }
      checksum: { type: string }
      projectId: { type: string }

  - name: ArtifactVersion
    description: Drive artifact version.
    dataDomain: FILE
    sourceApp: drive
    sourceService: drive-api
    primaryKey: versionId
    properties:
      versionId: { type: string, required: true }
      artifactId: { type: string, required: true }
      versionNo: { type: number }
      sizeBytes: { type: number }
      etag: { type: string }
      sha256: { type: string }
      path: { type: string }
      checksum: { type: string }

  - name: BomVersion
    description: Foundation BOM version.
    dataDomain: FOUNDATION_MODEL
    sourceApp: foundation_workbench
    sourceService: foundation-bom-api
    primaryKey: versionId
    properties:
      versionId: { type: string, required: true }
      stage: { type: string, enum: [EBOM, PBOM, MBOM] }
      status: { type: string, enum: [PENDING_ADOPTION, ACTIVE, ARCHIVED] }
      partCount: { type: number }
      parentVersionId: { type: string }
      changeSummary: { type: string }
      createdBy: { type: string }
      partIds: { type: array<string> }

  - name: FoundationSheet
    description: Foundation material sheet.
    dataDomain: FOUNDATION_MODEL
    sourceApp: foundation_workbench
    sourceService: foundation-material-api
    primaryKey: sheetId
    properties:
      sheetId: { type: string, required: true }
      sheetCode: { type: string }
      material: { type: string }
      materialCode: { type: string }
      thickness: { type: number }
      width: { type: number }
      height: { type: number }
      size: { type: object }
      quantity: { type: number }
      status: { type: string, enum: [AVAILABLE, RESERVED, CONSUMED] }
      location: { type: string }

  - name: SheetReservation
    description: Foundation sheet reservation.
    dataDomain: FOUNDATION_MODEL
    sourceApp: foundation_workbench
    sourceService: foundation-material-api
    primaryKey: reservationId
    properties:
      reservationId: { type: string, required: true }
      sheetId: { type: string, required: true }
      quantity: { type: number }
      status: { type: string, enum: [PREPARED, CONFIRMED, CANCELED, EXPIRED] }
      expiresAt: { type: string, format: date-time }
      idempotencyKey: { type: string }

  - name: App
    description: Foundation app catalog entry.
    dataDomain: FOUNDATION_MODEL
    sourceApp: foundation_workbench
    sourceService: foundation-iam-api
    primaryKey: appId
    properties:
      appId: { type: string, required: true }
      name: { type: string, required: true }
      scopes: { type: array<string> }
      route: { type: string }
      installed: { type: boolean }
      grantCount: { type: number }

  - name: SecurityPolicy
    description: Ontology security policy.
    dataDomain: FOUNDATION_MODEL
    sourceApp: foundation_workbench
    sourceService: foundation-iam-api
    primaryKey: policyId
    properties:
      policyId: { type: string, required: true }
      sourceAppId: { type: string, required: true }
      allowedConsumers: { type: array<string> }
      dataDomain: { type: string, required: true }
      purpose: { type: string, required: true }
      retention: { type: string, required: true }
      revocationMode: { type: string, required: true }
      status: { type: string }
      legalGate: { type: string }

  - name: ProductionPlan
    description: APS production plan.
    dataDomain: SCHEDULING
    sourceApp: aps
    sourceService: aps-api
    primaryKey: planId
    properties:
      planId: { type: string, required: true }
      planNo: { type: string }
      planCode: { type: string, required: true }
      orderCode: { type: string }
      orderObjectId: { type: string }
      layoutCode: { type: string }
      layoutId: { type: string }
      machineMode: { type: string }
      material: { type: string }
      priority: { type: number }
      dueAt: { type: string, format: date-time }
      status: { type: string, enum: [pending, ready, scheduled, done, blocked] }
      machineId: { type: string }

  - name: Machine
    description: APS machine.
    dataDomain: SCHEDULING
    sourceApp: aps
    sourceService: aps-api
    primaryKey: machineId
    properties:
      machineId: { type: string, required: true }
      name: { type: string, required: true }
      category: { type: string, enum: [LASER, PLASMA] }
      status: { type: string, enum: [idle, busy, maintenance] }
      capacityHours: { type: number }
      loadHours: { type: number }

  - name: ScheduleRecord
    description: APS schedule operation record.
    dataDomain: SCHEDULING
    sourceApp: aps
    sourceService: aps-api
    primaryKey: recordId
    properties:
      recordId: { type: string, required: true }
      action: { type: string, enum: [single, batch] }
      planId: { type: string }
      planCode: { type: string }
      machineId: { type: string }
      machineName: { type: string }
      operator: { type: string }
      status: { type: string }
      note: { type: string }
