<!DOCTYPE html>
<html>

<head>
    <title>Earcut Debug</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
        }

        canvas {
            border: 1px solid #444;
            margin: 20px;
        }
    </style>
</head>

<body>
    <h1>Earcut Debug</h1>
    <canvas id="c" width="800" height="600"></canvas>
    <div id="status">Running...</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        function createRect(x, y, w, h) {
            return [
                { x: x, y: y },
                { x: x + w, y: y },
                { x: x + w, y: y + h },
                { x: x, y: y + h }
            ];
        }

        function createCircle(cx, cy, r, segments = 24) {
            const points = [];
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                points.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r
                });
            }
            return points;
        }

        function createGridHoles(bx, by, bw, bh, cols, rows, r) {
            const holes = [];
            const stepX = bw / (cols + 1);
            const stepY = bh / (rows + 1);
            for (let i = 1; i <= cols; i++) {
                for (let j = 1; j <= rows; j++) {
                    holes.push(createCircle(bx + i * stepX, by + j * stepY, r));
                }
            }
            return holes;
        }

        const testCases = [
            // Case 1: Rectangle with 8 holes (2 rows of 4)
            {
                name: "8 Holes",
                outer: createRect(50, 50, 300, 150),
                holes: createGridHoles(50, 50, 300, 150, 4, 2, 12)
            },
            // Case 2: Square with 4 holes
            {
                name: "4 Holes",
                outer: createRect(400, 50, 150, 150),
                holes: createGridHoles(400, 50, 150, 150, 2, 2, 15)
            },
            // Case 3: Long strip with holes at ends
            {
                name: "Long Strip",
                outer: createRect(50, 250, 500, 60),
                holes: [
                    createCircle(90, 280, 15),
                    createCircle(510, 280, 15)
                ]
            }
        ];

        // ==========================================
        // EARCUT IMPLEMENTATION (Inlined JS)
        // ==========================================
        function earcut(data, holeIndices = [], dim = 2) {
            const hasHoles = holeIndices && holeIndices.length;
            const outerLen = hasHoles ? holeIndices[0] * dim : data.length;
            let outerNode = linkedList(data, 0, outerLen, dim, true);
            const triangles = [];

            if (!outerNode || outerNode.prev === outerNode.next) return triangles;

            let minX, minY, maxX, maxY, x, y, invSize;

            if (hasHoles) outerNode = eliminateHoles(data, holeIndices, outerNode, dim);

            // if the shape is not too simple, we'll use z-order curve hash later; calculate polygon bbox
            if (data.length > 80 * dim) {
                minX = maxX = data[0];
                minY = maxY = data[1];

                for (let i = dim; i < outerLen; i += dim) {
                    x = data[i];
                    y = data[i + 1];
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }

                invSize = Math.max(maxX - minX, maxY - minY);
                invSize = invSize !== 0 ? 32767 / invSize : 0; // Original earcut uses 32767, not 1
            }

            earcutLinked(outerNode, triangles, dim, minX, minY, invSize);

            return triangles;
        }

        function linkedList(data, start, end, dim, clockwise) {
            let i, last = null;
            if (clockwise === (signedArea(data, start, end, dim) > 0)) {
                for (i = start; i < end; i += dim) last = insertNode(i, data[i], data[i + 1], last);
            } else {
                for (i = end - dim; i >= start; i -= dim) last = insertNode(i, data[i], data[i + 1], last);
            }
            if (last && equals(last, last.next)) {
                removeNode(last);
                last = last.next;
            }
            return last;
        }

        function filterPoints(start, end) {
            if (!start) return start;
            if (!end) end = start;
            let p = start, again;
            do {
                again = false;
                if (!p.steiner && (equals(p, p.next) || area(p.prev, p, p.next) === 0)) {
                    removeNode(p);
                    p = end = p.prev;
                    if (p === p.next) break;
                    again = true;
                } else {
                    p = p.next;
                }
            } while (again || p !== end);
            return end;
        }

        function earcutLinked(ear, triangles, dim, minX, minY, invSize, pass = 0) {
            if (!ear) return;
            if (!pass && invSize) indexCurve(ear, minX, minY, invSize);
            let stop = ear, prev, next;
            while (ear.prev !== ear.next) {
                prev = ear.prev;
                next = ear.next;
                if (invSize ? isEarHashed(ear, minX, minY, invSize) : isEar(ear)) {
                    triangles.push(prev.i / dim | 0);
                    triangles.push(ear.i / dim | 0);
                    triangles.push(next.i / dim | 0);
                    removeNode(ear);
                    ear = next.next;
                    stop = next.next;
                    continue;
                }
                ear = next;
                if (ear === stop) {
                    if (!pass) {
                        earcutLinked(filterPoints(ear), triangles, dim, minX, minY, invSize, 1);
                    } else if (pass === 1) {
                        ear = cureLocalIntersections(filterPoints(ear), triangles, dim);
                        earcutLinked(ear, triangles, dim, minX, minY, invSize, 2);
                    } else if (pass === 2) {
                        splitEarcut(ear, triangles, dim, minX, minY, invSize);
                    }
                    break;
                }
            }
        }

        function isEar(ear) {
            const a = ear.prev, b = ear, c = ear.next;
            if (area(a, b, c) >= 0) return false;
            let p = ear.next.next;
            while (p !== ear.prev) {
                if (pointInTriangle(a.x, a.y, b.x, b.y, c.x, c.y, p.x, p.y) &&
                    area(p.prev, p, p.next) >= 0) return false;
                p = p.next;
            }
            return true;
        }

        function isEarHashed(ear, minX, minY, invSize) {
            const a = ear.prev, b = ear, c = ear.next;
            if (area(a, b, c) >= 0) return false;
            const minTX = a.x < b.x ? (a.x < c.x ? a.x : c.x) : (b.x < c.x ? b.x : c.x),
                minTY = a.y < b.y ? (a.y < c.y ? a.y : c.y) : (b.y < c.y ? b.y : c.y),
                maxTX = a.x > b.x ? (a.x > c.x ? a.x : c.x) : (b.x > c.x ? b.x : c.x),
                maxTY = a.y > b.y ? (a.y > c.y ? a.y : c.y) : (b.y > c.y ? b.y : c.y);
            const minZ = zOrder(minTX, minTY, minX, minY, invSize),
                maxZ = zOrder(maxTX, maxTY, minX, minY, invSize);
            let p = ear.prevZ, n = ear.nextZ;
            while (p && p.z >= minZ && n && n.z <= maxZ) {
                if (p !== ear.prev && p !== ear.next &&
                    pointInTriangle(a.x, a.y, b.x, b.y, c.x, c.y, p.x, p.y) &&
                    area(p.prev, p, p.next) >= 0) return false;
                p = p.prevZ;
                if (n !== ear.prev && n !== ear.next &&
                    pointInTriangle(a.x, a.y, b.x, b.y, c.x, c.y, n.x, n.y) &&
                    area(n.prev, n, n.next) >= 0) return false;
                n = n.nextZ;
            }
            while (p && p.z >= minZ) {
                if (p !== ear.prev && p !== ear.next &&
                    pointInTriangle(a.x, a.y, b.x, b.y, c.x, c.y, p.x, p.y) &&
                    area(p.prev, p, p.next) >= 0) return false;
                p = p.prevZ;
            }
            while (n && n.z <= maxZ) {
                if (n !== ear.prev && n !== ear.next &&
                    pointInTriangle(a.x, a.y, b.x, b.y, c.x, c.y, n.x, n.y) &&
                    area(n.prev, n, n.next) >= 0) return false;
                n = n.nextZ;
            }
            return true;
        }

        function cureLocalIntersections(start, triangles, dim) {
            let p = start;
            do {
                const a = p.prev, b = p.next.next;
                if (!equals(a, b) && intersects(a, p, p.next, b) && locallyInside(a, b) && locallyInside(b, a)) {
                    triangles.push(a.i / dim | 0);
                    triangles.push(p.i / dim | 0);
                    triangles.push(b.i / dim | 0);
                    removeNode(p);
                    removeNode(p.next);
                    p = start = b;
                }
                p = p.next;
            } while (p !== start);
            return filterPoints(p);
        }

        function splitEarcut(start, triangles, dim, minX, minY, invSize) {
            let a = start;
            do {
                let b = a.next.next;
                while (b !== a.prev) {
                    if (a.i !== b.i && isValidDiagonal(a, b)) {
                        let c = splitPolygon(a, b);
                        a = filterPoints(a, a.next);
                        c = filterPoints(c, c.next);
                        earcutLinked(a, triangles, dim, minX, minY, invSize);
                        earcutLinked(c, triangles, dim, minX, minY, invSize);
                        return;
                    }
                    b = b.next;
                }
                a = a.next;
            } while (a !== start);
        }

        function eliminateHoles(data, holeIndices, outerNode, dim) {
            const queue = [];
            let i, len, start, end, list;
            for (i = 0, len = holeIndices.length; i < len; i++) {
                start = holeIndices[i] * dim;
                end = i < len - 1 ? holeIndices[i + 1] * dim : data.length;
                list = linkedList(data, start, end, dim, false);
                if (list === list.next) list.steiner = true;
                queue.push(getLeftmost(list));
            }
            queue.sort(compareX);
            for (i = 0; i < queue.length; i++) {
                outerNode = eliminateHole(queue[i], outerNode);
                outerNode = filterPoints(outerNode, outerNode.next);
            }
            return outerNode;
        }

        function compareX(a, b) { return a.x - b.x; }

        function eliminateHole(hole, outerNode) {
            outerNode = findHoleBridge(hole, outerNode);
            if (outerNode) {
                const b = splitPolygon(outerNode, hole); // splitPolygon is used here to merge loops
                filterPoints(outerNode, outerNode.next);
                filterPoints(b, b.next);
            }
            return outerNode;
        }

        function findHoleBridge(hole, outerNode) {
            let p = outerNode, hx = hole.x, hy = hole.y, qx = -Infinity, m = null;
            do {
                if (hy <= p.y && hy >= p.next.y && p.next.y !== p.y) {
                    const x = p.x + (hy - p.y) * (p.next.x - p.x) / (p.next.y - p.y);
                    if (x <= hx && x > qx) {
                        qx = x;
                        if (x === hx) {
                            if (hy === p.y) return p;
                            if (hy === p.next.y) return p.next;
                        }
                        m = p.x < p.next.x ? p : p.next;
                    }
                }
                p = p.next;
            } while (p !== outerNode);
            if (!m) return outerNode;
            if (hx === qx) return m;
            const stop = m, mx = m.x, my = m.y;
            let tanMin = Infinity, tan;
            p = m;
            do {
                if (hx >= p.x && p.x >= mx && hx !== p.x &&
                    pointInTriangle(hy < my ? hx : qx, hy, mx, my, hy < my ? qx : hx, hy, p.x, p.y)) {
                    tan = Math.abs(hy - p.y) / (hx - p.x);
                    if (locallyInside(p, hole) &&
                        (tan < tanMin || (tan === tanMin && (p.x > m.x || (p.x === m.x && sectorContainsSector(m, p)))))) {
                        m = p;
                        tan = tanMin;
                    }
                }
                p = p.next;
            } while (p !== stop);
            return m;
        }

        function sectorContainsSector(m, p) {
            return area(m.prev, m, p.prev) < 0 && area(p.next, m, m.next) < 0;
        }

        function indexCurve(start, minX, minY, invSize) {
            let p = start;
            do {
                if (p.z === null) p.z = zOrder(p.x, p.y, minX, minY, invSize);
                p.prevZ = p.prev;
                p.nextZ = p.next;
                p = p.next;
            } while (p !== start);
            p.prevZ.nextZ = null;
            p.prevZ = null;
            sortLinked(p);
        }

        function sortLinked(list) {
            let i, p, q, e, tail, numMerges, pSize, qSize, inSize = 1;
            do {
                p = list;
                list = null;
                tail = null;
                numMerges = 0;
                while (p) {
                    numMerges++;
                    q = p;
                    pSize = 0;
                    for (i = 0; i < inSize; i++) {
                        pSize++;
                        q = q.nextZ;
                        if (!q) break;
                    }
                    qSize = inSize;
                    while (pSize > 0 || (qSize > 0 && q)) {
                        if (pSize === 0) {
                            e = q;
                            q = q.nextZ;
                            qSize--;
                        } else if (qSize === 0 || !q) {
                            e = p;
                            p = p.nextZ;
                            pSize--;
                        } else if (p.z <= q.z) {
                            e = p;
                            p = p.nextZ;
                            pSize--;
                        } else {
                            e = q;
                            q = q.nextZ;
                            qSize--;
                        }
                        if (tail) tail.nextZ = e;
                        else list = e;
                        e.prevZ = tail;
                        tail = e;
                    }
                    p = q;
                }
                tail.nextZ = null;
                inSize *= 2;
            } while (numMerges > 1);
            return list;
        }

        function zOrder(x, y, minX, minY, invSize) {
            x = 32767 * (x - minX) * invSize;
            y = 32767 * (y - minY) * invSize;
            x = (x | (x << 8)) & 0x00FF00FF;
            x = (x | (x << 4)) & 0x0F0F0F0F;
            x = (x | (x << 2)) & 0x33333333;
            x = (x | (x << 1)) & 0x55555555;
            y = (y | (y << 8)) & 0x00FF00FF;
            y = (y | (y << 4)) & 0x0F0F0F0F;
            y = (y | (y << 2)) & 0x33333333;
            y = (y | (y << 1)) & 0x55555555;
            return x | (y << 1);
        }

        function getLeftmost(start) {
            let p = start, leftmost = start;
            do {
                if (p.x < leftmost.x || (p.x === leftmost.x && p.y < leftmost.y)) leftmost = p;
                p = p.next;
            } while (p !== start);
            return leftmost;
        }

        function pointInTriangle(ax, ay, bx, by, cx, cy, px, py) {
            return (cx - px) * (ay - py) - (ax - px) * (cy - py) >= 0 &&
                (ax - px) * (by - py) - (bx - px) * (ay - py) >= 0 &&
                (bx - px) * (cy - py) - (cx - px) * (by - py) >= 0;
        }

        function isValidDiagonal(a, b) {
            return a.next.i !== b.i && a.prev.i !== b.i && !intersectsPolygon(a, b) &&
                (locallyInside(a, b) && locallyInside(b, a) && middleInside(a, b) &&
                    (area(a.prev, a, b.prev) !== 0 || area(a, b.prev, b) !== 0) ||
                    equals(a, b) && area(a.prev, a, a.next) > 0 && area(b.prev, b, b.next) > 0);
        }

        function area(p, q, r) {
            return (q.y - p.y) * (r.x - q.x) - (q.x - p.x) * (r.y - q.y);
        }

        function intersects(p1, q1, p2, q2) {
            const o1 = sign(area(p1, q1, p2));
            const o2 = sign(area(p1, q1, q2));
            const o3 = sign(area(p2, q2, p1));
            const o4 = sign(area(p2, q2, q1));
            if (o1 !== o2 && o3 !== o4) return true;
            if (o1 === 0 && onSegment(p1, p2, q1)) return true;
            if (o2 === 0 && onSegment(p1, q2, q1)) return true;
            if (o3 === 0 && onSegment(p2, p1, q2)) return true;
            if (o4 === 0 && onSegment(p2, q1, q2)) return true;
            return false;
        }

        function onSegment(p, i, q) {
            return i.x <= Math.max(p.x, q.x) && i.x >= Math.min(p.x, q.x) && i.y <= Math.max(p.y, q.y) && i.y >= Math.min(p.y, q.y);
        }

        function sign(num) {
            return num > 0 ? 1 : num < 0 ? -1 : 0;
        }

        function intersectsPolygon(a, b) {
            let p = a;
            do {
                if (p.i !== a.i && p.next.i !== a.i && p.i !== b.i && p.next.i !== b.i &&
                    intersects(p, p.next, a, b)) return true;
                p = p.next;
            } while (p !== a);
            return false;
        }

        function locallyInside(a, b) {
            return area(a.prev, a, a.next) < 0 ?
                area(a, b, a.next) >= 0 && area(a, a.prev, b) >= 0 :
                area(a, b, a.prev) < 0 || area(a, a.next, b) < 0;
        }

        function middleInside(a, b) {
            let p = a, inside = false, px = (a.x + b.x) / 2, py = (a.y + b.y) / 2;
            do {
                if (((p.y > py) !== (p.next.y > py)) && p.next.y !== p.y &&
                    (px < (p.next.x - p.x) * (py - p.y) / (p.next.y - p.y) + p.x))
                    inside = !inside;
                p = p.next;
            } while (p !== a);
            return inside;
        }

        function splitPolygon(a, b) {
            const a2 = new Node(a.i, a.x, a.y), b2 = new Node(b.i, b.x, b.y), an = a.next, bp = b.prev;
            a.next = b; b.prev = a; a2.next = an; an.prev = a2; b2.next = a2; a2.prev = b2; b2.prev = bp; bp.next = b2;
            return b2;
        }

        function insertNode(i, x, y, last) {
            const p = new Node(i, x, y);
            if (!last) { p.prev = p; p.next = p; }
            else { p.next = last.next; p.prev = last; last.next.prev = p; last.next = p; }
            return p;
        }

        function removeNode(p) {
            p.next.prev = p.prev;
            p.prev.next = p.next;
            if (p.prevZ) p.prevZ.nextZ = p.nextZ;
            if (p.nextZ) p.nextZ.prevZ = p.prevZ;
        }

        function Node(i, x, y) {
            this.i = i; this.x = x; this.y = y;
            this.prev = null; this.next = null; this.z = null; this.prevZ = null; this.nextZ = null; this.steiner = false;
        }

        function signedArea(data, start, end, dim) {
            let sum = 0;
            for (let i = start, j = end - dim; i < end; i += dim) {
                sum += (data[j] - data[i]) * (data[i + 1] + data[j + 1]);
                j = i;
            }
            return sum;
        }

        function equals(p1, p2) { return p1.x === p2.x && p1.y === p2.y; }

        // ==========================================
        // TEST CASE & VISUALIZATION
        // ==========================================
        function getContext() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            return { canvas, ctx };
        }

        function drawContour(ctx, points) {
            if (!points.length) return;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath();
            ctx.stroke();
        }

        function runTest() {
            const { ctx } = getContext();
            ctx.clearRect(0, 0, 800, 600);

            // Visual params
            const OX = 100, OY = 100;
            const S = 1.0;

            // Long bar with 2 holes (Simulating user issue)
            const outer = {
                points: [
                    { x: 0, y: 0 }, { x: 400, y: 0 }, { x: 400, y: 60 }, { x: 0, y: 60 }
                ]
            };

            const holes = [
                { points: [{ x: 50, y: 20 }, { x: 100, y: 20 }, { x: 100, y: 40 }, { x: 50, y: 40 }] },
                { points: [{ x: 300, y: 20 }, { x: 350, y: 20 }, { x: 350, y: 40 }, { x: 300, y: 40 }] }
            ];

            // Transform helpers
            const transform = p => ({ x: p.x * S + OX, y: p.y * S + OY });

            // Flatten data for earcut
            const data = [];
            const holeIndices = [];

            // Outer ring
            outer.points.forEach(p => data.push(p.x, p.y));

            // Holes
            holes.forEach(hole => {
                holeIndices.push(data.length / 2); // Start index in Vertex count (data length / 2)
                // OR Earcut expects indices relative to data array?
                // "holeIndices is an array of hole start indices (index of the first vertex of the hole in the input data array)"
                // Wait, index of vertex? or index of coordinate?
                // "holeIndices: [10, 20]" means hole starts at index 10 (20th number) and 20 (40th number)
                hole.points.forEach(p => data.push(p.x, p.y));
            });

            // Draw original outlines
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 2;
            drawContour(ctx, outer.points.map(transform));
            ctx.strokeStyle = 'cyan';
            holes.forEach(h => drawContour(ctx, h.points.map(transform)));

            // Perform Triangulation
            try {
                const indices = earcut(data, holeIndices);

                // Draw Triangles
                ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                ctx.lineWidth = 1;

                // Reconstruct vertices for drawing (indices are vertex indices)
                const vertices = [];
                for (let i = 0; i < data.length; i += 2) {
                    vertices.push({ x: data[i], y: data[i + 1] });
                }

                for (let i = 0; i < indices.length; i += 3) {
                    const p1 = vertices[indices[i]];
                    const p2 = vertices[indices[i + 1]];
                    const p3 = vertices[indices[i + 2]];

                    const t1 = transform(p1);
                    const t2 = transform(p2);
                    const t3 = transform(p3);

                    ctx.beginPath();
                    ctx.moveTo(t1.x, t1.y);
                    ctx.lineTo(t2.x, t2.y);
                    ctx.lineTo(t3.x, t3.y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                document.getElementById('status').innerText = `Done. Triangles: ${indices.length / 3}`;
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = `Error: ${e.message}`;
            }
        }

        runTest();
    </script>
</body>

</html>
