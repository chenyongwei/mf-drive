name: failure
description: Failure-heavy data and slow responses for resiliency tests
http:
  ordering: failure
  drawing: failure
  nesting: failure
events:
  drawing.parts.ready: failure
  nesting.job.completed: failure
  ordering.order.updated: failure
failureInjection:
  enabled: true
  latencyMs: 1200
  supported:
    - 401
    - 403
    - 409
    - 500
    - timeout
