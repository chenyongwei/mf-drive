openapi: 3.0.3
info:
  title: foundation-iam-api
  version: 2.0.0
paths:
  /oauth/account/session:
    get:
      operationId: foundationAccountSession
      summary: Get MF global account authorization session
      responses:
        '200':
          description: Current account session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSessionResponse'

  /oauth/account/authorize:
    post:
      operationId: foundationAccountAuthorize
      summary: Authorize MF account globally (idempotent)
      responses:
        '200':
          description: Account session authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSessionResponse'

  /oauth/account/revoke:
    post:
      operationId: foundationAccountRevoke
      summary: Revoke MF account global authorization
      responses:
        '200':
          description: Account session revoked
          content:
            application/json:
              schema:
                type: object
                required: [success, accountAuthorized, revokedAt]
                properties:
                  success:
                    type: boolean
                  accountAuthorized:
                    type: boolean
                  revokedAt:
                    type: string

  /oauth/authorize:
    get:
      operationId: foundationAuthorize
      summary: OAuth authorize endpoint for official applications
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            type: string
        - name: response_type
          in: query
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Authorization request accepted
          content:
            application/json:
              schema:
                type: object
                required: [authorizationId, grantId, clientId, requestedScopes, tenantId]
                properties:
                  authorizationId:
                    type: string
                  grantId:
                    type: string
                  clientId:
                    type: string
                  tenantId:
                    type: string
                  requestedScopes:
                    type: array
                    items:
                      type: string

  /oauth/token:
    post:
      operationId: foundationToken
      summary: OAuth token endpoint (authorization_code + client_credentials)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, client_credentials]
                client_id:
                  type: string
                grant_id:
                  type: string
                app_key:
                  type: string
                app_secret:
                  type: string
                tenant_id:
                  type: string
                scope:
                  type: string
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /oauth/introspect:
    post:
      operationId: foundationIntrospect
      summary: OAuth token introspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectResponse'

  /oauth/jwks:
    get:
      operationId: foundationJwks
      summary: Public JWKS
      responses:
        '200':
          description: JSON Web Key Set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  /api/foundation/apps/catalog:
    get:
      operationId: listFoundationAppsCatalog
      summary: List MF apps with L1 authorization and resource grant status
      parameters:
        - name: sourceAppId
          in: query
          required: false
          schema:
            type: string
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Application catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppsCatalogResponse'

  /api/foundation/apps/marketplace:
    get:
      operationId: listFoundationAppsMarketplace
      summary: List app store catalog with search/filter/sort/pagination
      parameters:
        - name: sourceAppId
          in: query
          required: false
          schema:
            type: string
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: installed
          in: query
          required: false
          schema:
            type: boolean
        - name: l1Authorized
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [featured, popular, updated, name]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Marketplace catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppsMarketplaceResponse'

  /api/foundation/apps/marketplace/{appId}:
    get:
      operationId: getFoundationMarketplaceAppDetail
      summary: Get app store detail
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: sourceAppId
          in: query
          required: false
          schema:
            type: string
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Marketplace app detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppMarketplaceDetailResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /api/foundation/apps/marketplace/{appId}/uninstall:
    post:
      operationId: uninstallFoundationMarketplaceApp
      summary: Uninstall app and revoke related grants
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: App uninstalled
          content:
            application/json:
              schema:
                type: object
                required: [success, appId, revokedGrantIds, uninstalledAt]
                properties:
                  success:
                    type: boolean
                  appId:
                    type: string
                  revokedGrantIds:
                    type: array
                    items:
                      type: string
                  uninstalledAt:
                    type: string

  /api/foundation/security/activities:
    get:
      operationId: listFoundationSecurityActivities
      summary: List security activities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Security activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityActivitiesResponse'

  /api/foundation/security/activities/{activityId}/confirm:
    post:
      operationId: confirmFoundationSecurityActivity
      summary: Confirm one security activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityActivityActionResponse'

  /api/foundation/security/grants/{grantId}/revoke:
    post:
      operationId: revokeFoundationSecurityGrant
      summary: Revoke one OAuth grant
      parameters:
        - name: grantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grant revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityGrantRevokeResponse'

  /api/foundation/security/official-apps/{appId}/bootstrap:
    post:
      operationId: bootstrapOfficialAppAuthorization
      summary: Bootstrap L1 authorization for one official app in tenant
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/FoundationAppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficialAppBootstrapRequest'
      responses:
        '200':
          description: Official app bootstrap result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficialAppBootstrapResponse'

  /api/foundation/security/official-apps/{appId}/members:
    get:
      operationId: listOfficialAppMembers
      summary: List L1 members for one official app in tenant
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/FoundationAppId'
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Membership list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficialAppMembershipListResponse'
    post:
      operationId: createOfficialAppMember
      summary: Add one official app member
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/FoundationAppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficialAppMembershipCreateRequest'
      responses:
        '200':
          description: Membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficialAppMembershipResponse'

  /api/foundation/security/official-apps/{appId}/members/{membershipId}/revoke:
    post:
      operationId: revokeOfficialAppMember
      summary: Revoke one official app member
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/FoundationAppId'
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Membership revoked
          content:
            application/json:
              schema:
                type: object
                required: [success, membershipId, revokedAt]
                properties:
                  success:
                    type: boolean
                  membershipId:
                    type: string
                  revokedAt:
                    type: string

  /api/foundation/security/resource-grants:
    get:
      operationId: listFoundationResourceGrants
      summary: List resource grants
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
        - name: sourceAppId
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/FoundationAppId'
        - name: consumerAppId
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/FoundationAppId'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, REVOKED, EXPIRED]
      responses:
        '200':
          description: Resource grants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceGrantListResponse'
    post:
      operationId: createFoundationResourceGrant
      summary: Create resource grant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceGrantCreateRequest'
      responses:
        '200':
          description: Resource grant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceGrantResponse'

  /api/foundation/security/resource-grants/{grantId}/revoke:
    post:
      operationId: revokeFoundationResourceGrant
      summary: Revoke one resource grant
      parameters:
        - name: grantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource grant revoked
          content:
            application/json:
              schema:
                type: object
                required: [success, grantId, revokedAt]
                properties:
                  success:
                    type: boolean
                  grantId:
                    type: string
                  revokedAt:
                    type: string

  /api/foundation/open-apps:
    get:
      operationId: listFoundationOpenApps
      summary: List open applications
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Open app list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAppListResponse'
    post:
      operationId: createFoundationOpenApp
      summary: Create one open application and initial credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAppCreateRequest'
      responses:
        '200':
          description: Open app created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAppCreateResponse'

  /api/foundation/open-apps/{openAppId}/credentials/rotate:
    post:
      operationId: rotateFoundationOpenAppCredentials
      summary: Rotate open app credentials
      parameters:
        - name: openAppId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credential rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAppCredentialRotateResponse'

  /api/foundation/security/pdp/evaluate:
    post:
      operationId: evaluateFoundationSecurityPdp
      summary: Evaluate one V2 policy decision request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PdpDecisionRequest'
      responses:
        '200':
          description: PDP decision result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdpDecisionResponse'

components:
  schemas:
    FoundationAppId:
      type: string
      enum: [nesting, drawing, ordering, crm, aps, wms, drive, foundation_workbench]

    MembershipRole:
      type: string
      enum: [OWNER, MEMBER]

    PrincipalType:
      type: string
      enum: [USER, OPEN_APP]

    ResourceGrantStatus:
      type: string
      enum: [ACTIVE, REVOKED, EXPIRED]

    AccountSessionResponse:
      type: object
      required: [accountAuthorized]
      properties:
        accountAuthorized:
          type: boolean
        accountAuthorizedAt:
          type: string
        revokedAt:
          type: string

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in, scope]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
        principal_type:
          $ref: '#/components/schemas/PrincipalType'
        tenant_id:
          type: string

    IntrospectResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        client_id:
          type: string
        sub:
          type: string
        scope:
          type: string
        exp:
          type: integer
        principal_type:
          $ref: '#/components/schemas/PrincipalType'
        principal_id:
          type: string
        tenant_id:
          type: string
        app_id:
          $ref: '#/components/schemas/FoundationAppId'
        open_app_id:
          type: string

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            required: [kty, kid, use, alg, n, e]
            properties:
              kty:
                type: string
              kid:
                type: string
              use:
                type: string
              alg:
                type: string
              n:
                type: string
              e:
                type: string

    AuthorizationWindow:
      type: object
      required: [startsAt, endsAt]
      properties:
        startsAt:
          type: string
        endsAt:
          type: string

    AppCatalogItem:
      type: object
      required:
        - appId
        - name
        - route
        - clientId
        - enabledByUser
        - requiredBaseScope
        - launchMode
        - miniSupported
        - l1Authorized
        - resourceGrantCount
      properties:
        appId:
          type: string
        name:
          type: string
        route:
          type: string
        clientId:
          type: string
        enabledByUser:
          type: boolean
        requiredBaseScope:
          type: string
        launchMode:
          type: string
          enum: [MINI, NEW_WINDOW]
        miniSupported:
          type: boolean
        installedAt:
          type: string
        l1Authorized:
          type: boolean
        membershipRole:
          $ref: '#/components/schemas/MembershipRole'
        resourceGrantCount:
          type: integer
          minimum: 0
        authorizationWindow:
          $ref: '#/components/schemas/AuthorizationWindow'

    AppsCatalogResponse:
      type: object
      required: [accountAuthorized, items, total]
      properties:
        accountAuthorized:
          type: boolean
        accountAuthorizedAt:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/AppCatalogItem'
        total:
          type: integer
          minimum: 0

    MarketplaceCategory:
      type: object
      required: [key, label, count]
      properties:
        key:
          type: string
        label:
          type: string
        count:
          type: integer
          minimum: 0

    AppMarketplaceItem:
      allOf:
        - $ref: '#/components/schemas/AppCatalogItem'
        - type: object
          required:
            - category
            - tagline
            - shortDescription
            - tags
            - highlights
            - updatedAt
            - ratingAverage
            - ratingCount
            - installCount
            - featured
          properties:
            category:
              type: string
            tagline:
              type: string
            shortDescription:
              type: string
            tags:
              type: array
              items:
                type: string
            highlights:
              type: array
              items:
                type: string
            updatedAt:
              type: string
            ratingAverage:
              type: number
              minimum: 0
              maximum: 5
            ratingCount:
              type: integer
              minimum: 0
            installCount:
              type: integer
              minimum: 0
            featured:
              type: boolean

    AppMarketplaceDetail:
      allOf:
        - $ref: '#/components/schemas/AppMarketplaceItem'
        - type: object
          required:
            - longDescription
            - screenshots
            - version
            - permissionScopes
            - permissionsSummary
          properties:
            longDescription:
              type: string
            screenshots:
              type: array
              items:
                type: string
            version:
              type: string
            permissionScopes:
              type: array
              items:
                type: string
            permissionsSummary:
              type: string

    AppsMarketplaceResponse:
      type: object
      required: [accountAuthorized, items, total, page, pageSize, categories]
      properties:
        accountAuthorized:
          type: boolean
        accountAuthorizedAt:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/AppMarketplaceItem'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        categories:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceCategory'

    AppMarketplaceDetailResponse:
      type: object
      required: [accountAuthorized, app]
      properties:
        accountAuthorized:
          type: boolean
        accountAuthorizedAt:
          type: string
        app:
          $ref: '#/components/schemas/AppMarketplaceDetail'

    SecurityActivity:
      type: object
      required: [activityId, activityType, actorPrincipalType, actorPrincipalId, status, createdAt]
      properties:
        activityId:
          type: string
        activityType:
          type: string
        actorPrincipalType:
          $ref: '#/components/schemas/PrincipalType'
        actorPrincipalId:
          type: string
        tenantId:
          type: string
        officialAppId:
          $ref: '#/components/schemas/FoundationAppId'
        membershipId:
          type: string
        resourceGrantId:
          type: string
        openAppId:
          type: string
        pdpDecisionId:
          type: string
        details:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [PENDING_CONFIRMATION, CONFIRMED]
        createdAt:
          type: string
        confirmedAt:
          type: string

    SecurityActivitiesResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SecurityActivity'
        total:
          type: integer
          minimum: 0

    SecurityActivityActionResponse:
      type: object
      required: [success, activity]
      properties:
        success:
          type: boolean
        activity:
          $ref: '#/components/schemas/SecurityActivity'

    SecurityGrantRevokeResponse:
      type: object
      required: [success, grantId, revokedAt]
      properties:
        success:
          type: boolean
        grantId:
          type: string
        revokedAt:
          type: string

    OfficialAppBootstrapRequest:
      type: object
      required: [tenantId, appId]
      properties:
        tenantId:
          type: string
        appId:
          $ref: '#/components/schemas/FoundationAppId'

    OfficialAppMembership:
      type: object
      required: [membershipId, tenantId, appId, subject, role, status, createdAt, updatedAt]
      properties:
        membershipId:
          type: string
        tenantId:
          type: string
        appId:
          $ref: '#/components/schemas/FoundationAppId'
        subject:
          type: string
        role:
          $ref: '#/components/schemas/MembershipRole'
        status:
          type: string
          enum: [ACTIVE, REVOKED]
        createdAt:
          type: string
        updatedAt:
          type: string
        revokedAt:
          type: string
        identityScopes:
          type: array
          items:
            type: string

    OfficialAppBootstrapResponse:
      type: object
      required: [success, created, membership]
      properties:
        success:
          type: boolean
        created:
          type: boolean
        membership:
          $ref: '#/components/schemas/OfficialAppMembership'

    OfficialAppMembershipListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OfficialAppMembership'
        total:
          type: integer
          minimum: 0

    OfficialAppMembershipCreateRequest:
      type: object
      required: [tenantId, subject, role]
      properties:
        tenantId:
          type: string
        subject:
          type: string
        role:
          $ref: '#/components/schemas/MembershipRole'
        identityScopes:
          type: array
          items:
            type: string

    OfficialAppMembershipResponse:
      type: object
      required: [success, membership]
      properties:
        success:
          type: boolean
        membership:
          $ref: '#/components/schemas/OfficialAppMembership'

    ResourceSelector:
      type: object
      properties:
        dataDomains:
          type: array
          items:
            type: string
        objectTypes:
          type: array
          items:
            type: string
        containerIds:
          type: array
          items:
            type: string
      additionalProperties: true

    ResourceGrant:
      type: object
      required:
        - grantId
        - tenantId
        - sourceAppId
        - consumerAppId
        - resourcePackId
        - selector
        - actions
        - startsAt
        - endsAt
        - status
        - createdAt
        - updatedAt
      properties:
        grantId:
          type: string
        tenantId:
          type: string
        sourceAppId:
          $ref: '#/components/schemas/FoundationAppId'
        consumerAppId:
          $ref: '#/components/schemas/FoundationAppId'
        resourcePackId:
          type: string
        selector:
          $ref: '#/components/schemas/ResourceSelector'
        actions:
          type: array
          items:
            type: string
            enum: [read, write, share, delete]
        startsAt:
          type: string
        endsAt:
          type: string
        status:
          $ref: '#/components/schemas/ResourceGrantStatus'
        createdBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        revokedAt:
          type: string

    ResourceGrantCreateRequest:
      type: object
      required: [tenantId, sourceAppId, consumerAppId, resourcePackId, selector, actions, startsAt, endsAt]
      properties:
        tenantId:
          type: string
        sourceAppId:
          $ref: '#/components/schemas/FoundationAppId'
        consumerAppId:
          $ref: '#/components/schemas/FoundationAppId'
        resourcePackId:
          type: string
        selector:
          $ref: '#/components/schemas/ResourceSelector'
        actions:
          type: array
          minItems: 1
          items:
            type: string
            enum: [read, write, share, delete]
        startsAt:
          type: string
        endsAt:
          type: string

    ResourceGrantResponse:
      type: object
      required: [success, resourceGrant]
      properties:
        success:
          type: boolean
        resourceGrant:
