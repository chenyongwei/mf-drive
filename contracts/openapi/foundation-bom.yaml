openapi: 3.0.3
info:
  title: foundation-bom-api
  version: 0.1.0
paths:
  /api/foundation/bom/ebom/import:
    post:
      operationId: importFoundationEbom
      summary: Import one EBOM package from Tekla side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EbomImportRequest'
      responses:
        '200':
          description: EBOM version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionEnvelope'
  /api/foundation/bom/pbom/attach:
    post:
      operationId: attachFoundationPbom
      summary: Attach CAPP requirement to create PBOM version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PbomAttachRequest'
      responses:
        '200':
          description: PBOM version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionEnvelope'
  /api/foundation/bom/mbom/submit:
    post:
      operationId: submitFoundationMbom
      summary: Submit MBOM package from Longgong side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MbomSubmitRequest'
      responses:
        '200':
          description: MBOM version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionEnvelope'
  /api/foundation/bom/versions:
    get:
      operationId: listFoundationBomVersions
      summary: List BOM versions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING_ADOPTION, ACTIVE, ARCHIVED]
      responses:
        '200':
          description: BOM versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionsResponse'
  /api/foundation/bom/versions/{versionId}/adopt:
    post:
      operationId: adoptFoundationBomVersion
      summary: Adopt one pending version
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version adopted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionActionResponse'
  /api/foundation/bom/versions/{versionId}/reject:
    post:
      operationId: rejectFoundationBomVersion
      summary: Reject one pending version
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionActionResponse'
  /api/foundation/bom/versions/{versionId}/diff:
    get:
      operationId: diffFoundationBomVersion
      summary: Diff one pending version with current active version
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Diff result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVersionDiffResponse'
components:
  schemas:
    EbomImportRequest:
      type: object
      required: [source, partIds]
      properties:
        source:
          type: string
          enum: [Tekla]
        partIds:
          type: array
          items:
            type: string
        geometryVersion:
          type: string
    PbomAttachRequest:
      type: object
      required: [sourceVersionId, requirements]
      properties:
        sourceVersionId:
          type: string
        requirements:
          type: array
          items:
            type: object
            required: [partId, processCode]
            properties:
              partId:
                type: string
              processCode:
                type: string
              params:
                type: object
                additionalProperties: true
    MbomSubmitRequest:
      type: object
      required: [sourceVersionId, nodes]
      properties:
        sourceVersionId:
          type: string
        nodes:
          type: array
          items:
            type: object
            required: [nodeId, partId]
            properties:
              nodeId:
                type: string
              partId:
                type: string
              quantity:
                type: integer
                minimum: 1
              processRoute:
                type: array
                items:
                  type: string
    BomVersion:
      type: object
      required: [versionId, stage, status, createdAt, partCount]
      properties:
        versionId:
          type: string
        stage:
          type: string
          enum: [EBOM, PBOM, MBOM]
        status:
          type: string
          enum: [PENDING_ADOPTION, ACTIVE, ARCHIVED]
        createdAt:
          type: string
        createdBy:
          type: string
        partCount:
          type: integer
        parentVersionId:
          type: string
        changeSummary:
          type: string
    BomVersionEnvelope:
      type: object
      required: [version]
      properties:
        version:
          $ref: '#/components/schemas/BomVersion'
    BomVersionsResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BomVersion'
        total:
          type: integer
          minimum: 0
    BomVersionActionResponse:
      type: object
      required: [success, version]
      properties:
        success:
          type: boolean
        version:
          $ref: '#/components/schemas/BomVersion'
    BomVersionDiffResponse:
      type: object
      required: [versionId, baseVersionId, impactedPartIds]
      properties:
        versionId:
          type: string
        baseVersionId:
          type: string
        impactedPartIds:
          type: array
          items:
            type: string
        summary:
          type: string
