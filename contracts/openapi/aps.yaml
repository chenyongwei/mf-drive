openapi: 3.0.3
info:
  title: aps-api
  version: 0.1.0
paths:
  /health:
    get:
      operationId: apsHealth
      summary: Health check for APS API
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, mode, scenario, at]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  mode:
                    type: string
                  scenario:
                    type: string
                  at:
                    type: string

  /api/aps/plans:
    get:
      operationId: listApsPlans
      summary: List scheduling plans
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: machineId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: APS plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApsPlansResponse'

  /api/aps/machines:
    get:
      operationId: listApsMachines
      summary: List machines and load status
      responses:
        '200':
          description: APS machines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApsMachinesResponse'

  /api/aps/schedule-records:
    get:
      operationId: listApsScheduleRecords
      summary: List schedule records
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: planId
          in: query
          required: false
          schema:
            type: string
        - name: machineId
          in: query
          required: false
          schema:
            type: string
        - name: operator
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: APS schedule records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApsScheduleRecordsResponse'

  /api/aps/plans/{planId}/schedule:
    post:
      operationId: scheduleApsPlan
      summary: Schedule one plan to one machine
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machineId, operator]
              properties:
                machineId:
                  type: string
                operator:
                  type: string
                note:
                  type: string
      responses:
        '200':
          description: Single schedule succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApsPlanScheduleResponse'

  /api/aps/plans/batch-schedule:
    post:
      operationId: batchScheduleApsPlans
      summary: Batch schedule plans to one machine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planIds, machineId, operator]
              properties:
                planIds:
                  type: array
                  items:
                    type: string
                machineId:
                  type: string
                operator:
                  type: string
      responses:
        '200':
          description: Batch schedule succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApsBatchScheduleResponse'

components:
  schemas:
    ApsPlanRow:
      type: object
      required: [planId, planCode, orderCode, layoutCode, material, priority, dueAt, status, machineId, updatedAt]
      properties:
        planId:
          type: string
        planCode:
          type: string
        orderCode:
          type: string
        layoutCode:
          type: string
        material:
          type: string
        priority:
          type: integer
        dueAt:
          type: string
        status:
          type: string
          enum: [pending, ready, scheduled, done, blocked]
        machineId:
          type: string
          nullable: true
        updatedAt:
          type: string

    ApsMachineRow:
      type: object
      required: [machineId, name, category, status, capacityHours, loadHours, updatedAt]
      properties:
        machineId:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [LASER, PLASMA]
        status:
          type: string
          enum: [idle, busy, maintenance]
        capacityHours:
          type: number
        loadHours:
          type: number
        updatedAt:
          type: string

    ApsScheduleRecordRow:
      type: object
      required: [recordId, action, planId, planCode, machineId, machineName, operator, status, createdAt]
      properties:
        recordId:
          type: string
        action:
          type: string
          enum: [single, batch]
        planId:
          type: string
        planCode:
          type: string
        machineId:
          type: string
        machineName:
          type: string
        operator:
          type: string
        status:
          type: string
          enum: [scheduled]
        note:
          type: string
        createdAt:
          type: string

    ApsPlansResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApsPlanRow'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1

    ApsMachinesResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApsMachineRow'
        total:
          type: integer
          minimum: 0

    ApsScheduleRecordsResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApsScheduleRecordRow'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1

    ApsPlanScheduleResponse:
      type: object
      required: [success, plan, machine, record]
      properties:
        success:
          type: boolean
        plan:
          $ref: '#/components/schemas/ApsPlanRow'
        machine:
          $ref: '#/components/schemas/ApsMachineRow'
        record:
          $ref: '#/components/schemas/ApsScheduleRecordRow'

    ApsBatchScheduleResponse:
      type: object
      required: [success, affected, machine, records]
      properties:
        success:
          type: boolean
        affected:
          type: integer
          minimum: 0
        machine:
          $ref: '#/components/schemas/ApsMachineRow'
        records:
          type: array
          items:
            $ref: '#/components/schemas/ApsScheduleRecordRow'
