openapi: 3.0.3
info:
  title: foundation-mcp-api
  version: 0.1.0
paths:
  /mcp/v1/resources/sheets/available:
    get:
      operationId: mcpListSheetResource
      summary: MCP resource endpoint for available sheets
      responses:
        '200':
          description: Resource payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SheetResourceResponse'
  /mcp/v1/tools/query_available_sheets:
    post:
      operationId: mcpToolQueryAvailableSheets
      summary: MCP tool call for querying available sheets
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Tool execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecutionResponse'
  /mcp/v1/tools/reserve_sheets:
    post:
      operationId: mcpToolReserveSheets
      summary: MCP tool call for reserving sheets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nestingId, items]
              properties:
                nestingId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    required: [sheetId, quantity]
                    properties:
                      sheetId:
                        type: string
                      quantity:
                        type: integer
      responses:
        '200':
          description: Tool execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecutionResponse'
  /mcp/v1/tools/submit_nesting_result:
    post:
      operationId: mcpToolSubmitNestingResult
      summary: MCP tool call for submitting nesting result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nestingId, bomVersionId]
              properties:
                nestingId:
                  type: string
                bomVersionId:
                  type: string
                records:
                  type: array
                  items:
                    type: object
                    required: [partId, sheetId, quantity]
                    properties:
                      partId:
                        type: string
                      sheetId:
                        type: string
                      quantity:
                        type: integer
      responses:
        '200':
          description: Tool execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecutionResponse'
components:
  schemas:
    SheetResource:
      type: object
      required: [sheetId, materialCode, thickness, quantity]
      properties:
        sheetId:
          type: string
        materialCode:
          type: string
        thickness:
          type: number
        quantity:
          type: integer
    SheetResourceResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SheetResource'
        total:
          type: integer
          minimum: 0
    ToolExecutionResponse:
      type: object
      required: [ok, tool, result]
      properties:
        ok:
          type: boolean
        tool:
          type: string
        result:
          type: object
          additionalProperties: true
