services:
  drive-web:
    image: ${MF_ACR_REGISTRY}/${MF_ACR_NAMESPACE}/drive-web:${MF_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MF_PORT_DRIVE_WEB}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5

  drive-api:
    image: ${MF_ACR_REGISTRY}/${MF_ACR_NAMESPACE}/drive-api:${MF_IMAGE_TAG}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      NODE_ENV: production
      DRIVE_DB_HOST: ${DRIVE_DB_HOST}
      DRIVE_DB_PORT: ${DRIVE_DB_PORT}
      DRIVE_DB_NAME: ${DRIVE_DB_NAME}
      DRIVE_DB_USER: ${DRIVE_DB_USER}
      DRIVE_DB_PASSWORD: ${DRIVE_DB_PASSWORD}
      DRIVE_MINIO_ENDPOINT: ${DRIVE_MINIO_ENDPOINT}
      DRIVE_MINIO_BUCKET: ${DRIVE_MINIO_BUCKET}
      DRIVE_MINIO_ACCESS_KEY: ${DRIVE_MINIO_ACCESS_KEY}
      DRIVE_MINIO_SECRET_KEY: ${DRIVE_MINIO_SECRET_KEY}
      FOUNDATION_IAM_URL: ${FOUNDATION_IAM_URL}
    ports:
      - "127.0.0.1:${MF_PORT_DRIVE_API}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const socket=require('node:net').createConnection({host:'127.0.0.1',port:3000},()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)
      interval: 20s
      timeout: 5s
      retries: 5
