asyncapi: 2.6.0
info:
  title: platform-events
  version: 0.2.0
channels:
  drawing.parts.ready:
    subscribe:
      operationId: onDrawingPartsReady
      message:
        $ref: '#/components/messages/DrawingPartsReady'
  nesting.job.completed:
    subscribe:
      operationId: onNestingJobCompleted
      message:
        $ref: '#/components/messages/NestingJobCompleted'
  ordering.order.updated:
    subscribe:
      operationId: onOrderingOrderUpdated
      message:
        $ref: '#/components/messages/OrderingOrderUpdated'
  foundation.bom.version.pending:
    subscribe:
      operationId: onFoundationBomVersionPending
      message:
        $ref: '#/components/messages/FoundationBomVersionPending'
  foundation.bom.version.adopted:
    subscribe:
      operationId: onFoundationBomVersionAdopted
      message:
        $ref: '#/components/messages/FoundationBomVersionAdopted'
  foundation.bom.version.rejected:
    subscribe:
      operationId: onFoundationBomVersionRejected
      message:
        $ref: '#/components/messages/FoundationBomVersionRejected'
  foundation.sheet.reservation.created:
    subscribe:
      operationId: onFoundationSheetReservationCreated
      message:
        $ref: '#/components/messages/FoundationSheetReservationCreated'
  foundation.sheet.consumption.committed:
    subscribe:
      operationId: onFoundationSheetConsumptionCommitted
      message:
        $ref: '#/components/messages/FoundationSheetConsumptionCommitted'
  foundation.sheet.consumption.rolledback:
    subscribe:
      operationId: onFoundationSheetConsumptionRolledback
      message:
        $ref: '#/components/messages/FoundationSheetConsumptionRolledback'
  foundation.inventory.synced:
    subscribe:
      operationId: onFoundationInventorySynced
      message:
        $ref: '#/components/messages/FoundationInventorySynced'
components:
  messages:
    DrawingPartsReady:
      name: DrawingPartsReady
      payload:
        $ref: '#/components/schemas/DrawingPartsReadyEvent'
    NestingJobCompleted:
      name: NestingJobCompleted
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    OrderingOrderUpdated:
      name: OrderingOrderUpdated
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationBomVersionPending:
      name: FoundationBomVersionPending
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationBomVersionAdopted:
      name: FoundationBomVersionAdopted
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationBomVersionRejected:
      name: FoundationBomVersionRejected
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationSheetReservationCreated:
      name: FoundationSheetReservationCreated
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationSheetConsumptionCommitted:
      name: FoundationSheetConsumptionCommitted
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationSheetConsumptionRolledback:
      name: FoundationSheetConsumptionRolledback
      payload:
        $ref: '#/components/schemas/EventEnvelope'
    FoundationInventorySynced:
      name: FoundationInventorySynced
      payload:
        $ref: '#/components/schemas/EventEnvelope'
  schemas:
    EventEnvelope:
      type: object
      required: [eventId, eventType, occurredAt, producer, workspaceId, payloadVersion, payload]
      properties:
        eventId:
          type: string
        eventType:
          type: string
        occurredAt:
          type: string
        producer:
          type: string
        workspaceId:
          type: string
        payloadVersion:
          type: string
        payload:
          type: object
    Point2D:
      type: object
      required: [x, y]
      properties:
        x:
          type: number
        y:
          type: number
    ContourSnapshot:
      type: object
      required: [contourId, closed, points]
      properties:
        contourId:
          type: string
        closed:
          type: boolean
        points:
          type: array
          items:
            $ref: '#/components/schemas/Point2D'
    BoundingBox:
      type: object
      required: [minX, minY, maxX, maxY]
      properties:
        minX:
          type: number
        minY:
          type: number
        maxX:
          type: number
        maxY:
          type: number
    DrawingPartSnapshot:
      type: object
      required: [partId, outerContour, innerContours, sourceEntityIds, bbox, geometryVersion]
      properties:
        partId:
          type: string
        outerContour:
          $ref: '#/components/schemas/ContourSnapshot'
        innerContours:
          type: array
          items:
            $ref: '#/components/schemas/ContourSnapshot'
        sourceEntityIds:
          type: array
          items:
            type: string
        bbox:
          $ref: '#/components/schemas/BoundingBox'
        geometryVersion:
          type: string
    DrawingPartsReadyPayload:
      type: object
      required: [fileId, partsCount, parts]
      properties:
        fileId:
          type: string
        partsCount:
          type: integer
          minimum: 0
        parts:
          type: array
          items:
            $ref: '#/components/schemas/DrawingPartSnapshot'
    DrawingPartsReadyEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            eventType:
              const: drawing.parts.ready
            payload:
              $ref: '#/components/schemas/DrawingPartsReadyPayload'
