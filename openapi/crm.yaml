openapi: 3.0.3
info:
  title: crm-api
  version: 0.1.0
paths:
  /api/crm/customers:
    get:
      operationId: listCrmCustomers
      summary: List CRM customers
      parameters:
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomersResponse'
    post:
      operationId: upsertCrmCustomer
      summary: Create or update CRM customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                code:
                  type: string
                enabled:
                  type: boolean
      responses:
        '200':
          description: Upsert result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomerUpsertResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomerUpsertResponse'

  /api/crm/customers/{customerId}:
    get:
      operationId: getCrmCustomer
      summary: Get one CRM customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomerResponse'

components:
  schemas:
    CrmCustomer:
      type: object
      required: [id, name, code, enabled, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        enabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    CrmCustomersResponse:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CrmCustomer'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    CrmCustomerResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/CrmCustomer'

    CrmCustomerUpsertResponse:
      type: object
      required: [item, updated]
      properties:
        item:
          $ref: '#/components/schemas/CrmCustomer'
        updated:
          type: boolean
