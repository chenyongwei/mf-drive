name: ci-drive

on:
  push:
    branches:
      - main
      - dev
      - 'release/**'
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out platform tooling
        uses: actions/checkout@v4
        with:
          repository: chenyongwei/mf
          path: .platform-root
          token: ${{ secrets.GITHUB_REPO_READ_TOKEN }}
          fetch-depth: 1

      - name: Run ci
        env:
          MF_CURRENT_REPO_ROOT: ${{ github.workspace }}
          
        run: ./.platform-root/.github/scripts/entrypoint.sh github ci "$GITHUB_WORKSPACE/.github/scripts/repo-config.sh"

