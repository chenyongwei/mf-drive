default:
  before_script:
    - command -v git >/dev/null
    - command -v bash >/dev/null
    - git clone --depth 1 --branch dev "https://oauth2:${GITLAB_TEMPLATE_TOKEN:-$CI_JOB_TOKEN}@git.fscut.com/mf/mf.git" .platform-root

deploy_test:
  stage: deploy_test
  needs:
    - ci_verify
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - MF_CURRENT_REPO_ROOT="$CI_PROJECT_DIR" ./.platform-root/.github/scripts/entrypoint.sh gitlab deploy-test "$CI_PROJECT_DIR/.gitlab/scripts/repo-config.sh"
  artifacts:
    when: always
    paths:
      - .ci-out/
